version: "3.9"

services:

  backend:
    build: ./backend

    container_name: ai-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend

    container_name: ai-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend